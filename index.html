<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Enterprise AI Hub | Professional Edition</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="dashboard">
        <aside id="sidebar">
            <div class="brand-box"><h1>AI Edge</h1><p>Executive Command</p></div>
            <!-- Value Add: Visual Progress -->
            <div class="ui-card">
                <h3>System Health</h3>
                <div id="progress-bar"><div id="progress-fill"></div></div>
                <p id="stats-text">0% Optimization</p>
            </div>
            <section id="weekly-audit" class="ui-card">
                <h2>Weekly Focus</h2>
                <textarea id="weekly-goals" class="ui-input" placeholder="Define high-leverage goals..."></textarea>
            </section>
        </aside>
        <main id="main-content">
            <div class="toolbar">
                <input type="text" id="search" class="ui-input" placeholder="Search workflow modules..." onkeyup="render()">
                <button class="btn-secondary" onclick="exportData()">Export Data</button>
            </div>
            <div id="course-list"></div>
            <section id="sandbox" class="ui-card">
                <div class="sandbox-header"><h2>Prompt Engineering Suite</h2><span class="badge">Enterprise</span></div>
                <input type="text" id="prompt-name" class="ui-input" placeholder="Prompt Name">
                <textarea id="prompt-body" class="ui-input" placeholder="Engineered prompt structure..."></textarea>
                <button class="btn-primary" onclick="savePrompt()">Deploy to Library</button>
                <div id="saved-prompts"></div>
            </section>
        </main>
    </div>
    <script src="script.js"></script>
</body>
</html>
