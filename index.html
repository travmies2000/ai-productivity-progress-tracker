<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Productivity System | Executive Hub</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="dashboard">
        <aside id="sidebar">
            <header>
                <h1>Command Center</h1>
                <p class="subtitle">AI Productivity System</p>
            </header>
            <div class="metric-cards">
                <div class="metric">
                    <span class="metric-label">Mastery</span>
                    <span class="metric-value"><span id="pct">0</span>%</span>
                </div>
                <div class="metric">
                    <span class="metric-label">Time Saved</span>
                    <span class="metric-value"><span id="total-time">0</span> min</span>
                </div>
            </div>
            <div id="progress-bar"><div id="progress-fill"></div></div>
            <section id="weekly-audit">
                <div class="audit-header"><h2>15-Minute Audit</h2></div>
                <textarea id="weekly-goals" placeholder="Define this week's high-leverage goals..."></textarea>
                <button class="btn-danger" onclick="resetWeeklyLog()">Reset Efficiency Stats</button>
            </section>
            <div class="sidebar-actions">
                <button id="focus-btn" class="btn-primary" onclick="toggleFocusMode()">Toggle Deep-Focus</button>
                <button id="export-btn" class="btn-secondary">Export Log</button>
            </div>
        </aside>
        <main id="main-content">
            <div class="search-container">
                <input type="text" id="search" placeholder="Search lessons or resources..." onkeyup="render()">
            </div>
            <div id="course-list"></div>
            <section id="sandbox">
                <div class="sandbox-header">
                    <h2>Prompt Sandbox</h2>
                    <span class="badge">Professional Tool</span>
                </div>
                <div class="sandbox-inputs">
                    <input type="text" id="prompt-name" placeholder="Prompt Name">
                    <textarea id="prompt-body" placeholder="Paste your engineered prompt here..."></textarea>
                    <textarea id="prompt-notes" placeholder="Version notes or iteration thoughts..."></textarea>
                    <button class="btn-primary" onclick="savePrompt()">Save to Hub</button>
                </div>
                <div id="saved-prompts"></div>
            </section>
        </main>
    </div>
    <script src="script.js"></script>
</body>
</html>
