<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>AI Productivity Course Path</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="app">
        <h1>Course Progress: <span id="pct">0</span>%</h1>
        <div id="progress-bar"><div id="progress-fill"></div></div>
        <div id="view">
            <h2 id="module-title">Click "Start Course"</h2>
            <p id="module-desc">Complete the assessment to move forward.</p>
            <textarea id="assessment" placeholder="Self-Assessment: What was your key takeaway and how did you implement it?"></textarea>
            <div style="margin-top: 10px;">
                <button id="next-btn">Complete & Continue</button>
                <button id="export-btn" style="background: #6b7280;">Export Reflections</button>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
