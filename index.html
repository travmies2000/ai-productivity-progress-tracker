<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Productivity System | Executive Hub</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="app">
        <header>
            <h1>AI Productivity System</h1>
            <p>Mastery: <span id="pct">0</span>% | Time Saved: <span id="total-time">0</span> mins</p>
        </header>
        <div id="progress-bar"><div id="progress-fill"></div></div>
        
        <div id="course-list"></div>
        
        <section id="sandbox">
            <h2>Prompt Sandbox</h2>
            <input type="text" id="prompt-name" placeholder="Prompt Name">
            <textarea id="prompt-body" placeholder="Paste your prompt here..."></textarea>
            <button onclick="savePrompt()" style="background: #2563eb;">Save to Hub</button>
            <div id="saved-prompts"></div>
        </section>

        <button id="export-btn">Export Full Execution Log</button>
    </div>
    <script src="script.js"></script>
</body>
</html>
